# .github/workflows/deploy-lambda.yml
# Workflow constitucional — openspec-constitution v2.2.0
#
# Jobs separados: `test` bloquea `deploy` via `needs: test`.
# Sin este gate no hay CI útil.

name: Deploy Lambda

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  deploy:
    name: Deploy to AWS Lambda
    runs-on: ubuntu-latest
    needs: test # <- sin esto no hay gate de calidad
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Descargar certificado TLS si el repo lo necesita (MongoDB Atlas, RDS, etc.)
      # Eliminar este paso si no aplica.
      - name: Download TLS certificate
        if: ${{ vars.GLOBAL_BUNDLE_PEM != '' }}
        run: aws s3 cp ${{ vars.GLOBAL_BUNDLE_PEM }} global-bundle.pem

      - name: Package Lambda
        run: |
          zip -r lambda.zip . \
            -x "*.git*" \
            -x "node_modules/aws-sdk/**" \
            -x "coverage/**" \
            -x "tests/**" \
            -x "openspec/**" \
            -x "*.md" \
            -x "vitest.config.js" \
            -x "eslint.config.js" \
            -x ".prettierrc" \
            -x ".claude/**"

      - name: Update Lambda function
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://lambda.zip
